<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liftoff Visualizer</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="LiftoffVisualizer.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem;">
            <div style="width:40px;height:40px;border:3px solid #eee;border-top:3px solid #E65100;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
            <div style="color:#999;font-family:Inter,sans-serif;font-size:0.9rem;">Loading Liftoff Visualizer...</div>
        </div>
        <style>@keyframes spin{100%{transform:rotate(360deg)}}</style>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#E65100;color:#fff;padding:0.8rem;text-align:center;z-index:1000;">
        An unhandled error has occurred.
        <a href="." class="reload" style="color:#fff;text-decoration:underline;margin-left:8px;">Reload</a>
        <span class="dismiss" style="cursor:pointer;margin-left:16px;">✕</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="js/chartInterop.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
