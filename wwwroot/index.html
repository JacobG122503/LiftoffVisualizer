<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liftoff Visualizer</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" id="dynamic-favicon" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Liftoff Visualizer" />
    <meta name="theme-color" content="#E65100" />
    <link href="LiftoffVisualizer.styles.css" rel="stylesheet" />
    <script>
      try {
        var lv_t = localStorage.getItem('lv-theme');
        if (lv_t) document.documentElement.setAttribute('data-theme', lv_t);
        var lv_a = localStorage.getItem('lv-accent');
        if (lv_a && /^#[0-9a-fA-F]{6}$/.test(lv_a)) {
          var lv_r=parseInt(lv_a.slice(1,3),16), lv_g=parseInt(lv_a.slice(3,5),16), lv_b=parseInt(lv_a.slice(5,7),16);
          var lv_adj=function(v){return '#'+[lv_r,lv_g,lv_b].map(function(c){var x=c+v;return(x<0?0:x>255?255:x).toString(16).padStart(2,'0')}).join('')};
          var lv_s=document.documentElement.style;
          lv_s.setProperty('--primary',lv_a);
          lv_s.setProperty('--primary-light',lv_adj(30));
          lv_s.setProperty('--primary-lighter',lv_adj(70));
          lv_s.setProperty('--primary-dark',lv_adj(-30));
          lv_s.setProperty('--primary-bg','rgba('+lv_r+','+lv_g+','+lv_b+',0.08)');
          lv_s.setProperty('--primary-bg-hover','rgba('+lv_r+','+lv_g+','+lv_b+',0.14)');
          lv_s.setProperty('--border-hover','rgba('+lv_r+','+lv_g+','+lv_b+',0.3)');
          lv_s.setProperty('--shadow-card-hover','0 8px 24px rgba('+lv_r+','+lv_g+','+lv_b+',0.12)');
          var lv_dk=lv_t==='dark';
          var lv_base_r=lv_dk?26:255,lv_base_g=lv_dk?26:255,lv_base_b=lv_dk?26:255,lv_mix=lv_dk?0.08:0.05;
          var lv_mr=Math.round(lv_base_r+(lv_r-lv_base_r)*lv_mix);
          var lv_mg=Math.round(lv_base_g+(lv_g-lv_base_g)*lv_mix);
          var lv_mb=Math.round(lv_base_b+(lv_b-lv_base_b)*lv_mix);
          lv_s.setProperty('--bg-card-hover','rgb('+lv_mr+','+lv_mg+','+lv_mb+')');
          // Set dynamic favicon
          var svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='${lv_a}'/><rect x='4' y='22' width='8' height='20' rx='3' fill='white'/><rect x='14' y='26' width='6' height='12' rx='2' fill='white'/><rect x='20' y='30' width='24' height='4' rx='2' fill='white'/><rect x='44' y='26' width='6' height='12' rx='2' fill='white'/><rect x='52' y='22' width='8' height='20' rx='3' fill='white'/></svg>`;
          var url = 'data:image/svg+xml,' + encodeURIComponent(svg);
          var link = document.querySelector("link[rel='icon']");
          if (!link) {
            link = document.createElement('link');
            link.rel = 'icon';
            document.head.appendChild(link);
          }
          link.type = 'image/svg+xml';
          link.href = url;
        }
      } catch(e) {}
    </script>
</head>

<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem;">
            <div id="initial-spinner" style="width:40px;height:40px;border:3px solid #eee;border-top:3px solid #E65100;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
            <div style="color:#999;font-family:Inter,sans-serif;font-size:0.9rem;">Loading Liftoff Visualizer...</div>
        </div>
        <style>@keyframes spin{100%{transform:rotate(360deg)}}</style>
        <script>
        // Set spinner accent color from localStorage as early as possible
        (function() {
          var accent = localStorage.getItem('lv-accent') || '#E65100';
          var spinner = document.getElementById('initial-spinner');
          if (spinner) {
            spinner.style.borderTopColor = accent;
          }
        })();
        </script>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#E65100;color:#fff;padding:0.8rem;text-align:center;z-index:1000;">
        An unhandled error has occurred.
        <a href="." class="reload" style="color:#fff;text-decoration:underline;margin-left:8px;">Reload</a>
        <span class="dismiss" style="cursor:pointer;margin-left:16px;">✕</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="js/themeHelper.js"></script>
    <script src="js/chartInterop.js"></script>
    <script src="js/shareInterop.js"></script>
    <script src="js/pwaHelper.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
